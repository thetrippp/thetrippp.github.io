<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Briefing | Premium Intelligence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --bg-color: #ffffff;
            --surface-color: #fcfcfc;
            --text-color: #111827;
            --text-muted: #4b5563;
            --text-light: #9ca3af;
            --accent-primary: #000000;
            /* Sophisticated Black */
            --accent-blue: #2563eb;
            --border-color: #e5e7eb;
            --max-width: 850px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Progress Bar */
        .progress-container {
            position: fixed;
            top: 0;
            z-index: 100;
            width: 100%;
            height: 4px;
            background: #eee;
        }

        .progress-bar {
            height: 4px;
            background: var(--accent-blue);
            width: 0%;
        }

        /* Header Layout */
        header {
            max-width: var(--max-width);
            margin: 80px auto 40px;
            padding: 0 24px;
            text-align: center;
        }

        h1 {
            font-family: 'Lora', serif;
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -0.04em;
            margin-bottom: 12px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 500;
        }

        .date {
            display: inline-block;
            margin-top: 24px;
            padding: 4px 12px;
            background: var(--text-color);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            border-radius: 4px;
        }

        /* Sticky Navigation */
        nav {
            position: sticky;
            top: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 90;
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 60px;
        }

        nav button {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 16px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.2s;
        }

        nav button:hover {
            background: var(--border-color);
            color: var(--text-color);
        }

        nav button.active {
            background: var(--text-color);
            color: white;
        }

        /* Main Content Container */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 24px 100px;
        }

        .tabcontent {
            display: none;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* News Typography */
        .section-heading {
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--accent-blue);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-heading::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: var(--border-color);
        }

        .ai-content {
            font-family: 'Lora', serif;
            /* Serif for better reading */
            font-size: 1.25rem;
            line-height: 1.8;
            color: #2d3748;
        }

        .ai-content p {
            margin-bottom: 24px;
        }

        /* Drop Cap Improvement */
        .ai-content p:first-of-type::first-letter {
            font-family: 'Inter', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            float: left;
            line-height: 0.8;
            padding-right: 12px;
            color: var(--text-color);
        }

        .ai-content h3 {
            font-family: 'Inter', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin: 48px 0 20px;
            letter-spacing: -0.02em;
        }

        /* List Styling */
        .ai-content ul {
            background: var(--surface-color);
            padding: 32px 40px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin: 32px 0;
        }

        .ai-content li {
            margin-bottom: 12px;
            font-size: 1.1rem;
            list-style-type: square;
            color: var(--text-muted);
        }

        /* Responsive */
        @media (max-width: 640px) {
            h1 {
                font-size: 3.5rem;
            }

            body {
                padding-top: 20px;
            }

            .ai-content {
                font-size: 1.1rem;
            }
        }
    </style>
</head>

<body>
    <div class="progress-container">
        <div class="progress-bar" id="myBar"></div>
    </div>

    <header>
        <h1>Daily Briefing</h1>
        <p class="subtitle">What's going on today?</p>
        <div class="date" id="last-sync-date">Loading...</div>
    </header>

    <nav id="tab-buttons"></nav>

    <main id="tab-contents"></main>

    <script>

        window.onscroll = function () {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };

        function openTab(evt, tabName) {
            document.querySelectorAll('.tabcontent').forEach(el => el.style.display = 'none');
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }

        async function buildMockup() {
            try {
                const [historyResponse, indexHtmlResponse] = await Promise.all([
                    fetch('history.json'),
                    fetch('index.html')
                ]);

                if (!historyResponse.ok || !indexHtmlResponse.ok) {
                    throw new Error('Could not load data files.');
                }

                const historyData = await historyResponse.json();
                const indexHtmlText = await indexHtmlResponse.text();
                const indexDoc = new DOMParser().parseFromString(indexHtmlText, 'text/html');

                const tabButtonsContainer = document.getElementById('tab-buttons');
                const tabContentsContainer = document.getElementById('tab-contents');

                for (const catName in historyData) {
                    if (historyData.hasOwnProperty(catName) && historyData[catName].length > 0) {
                        const latestEntry = historyData[catName][historyData[catName].length - 1];
                        const dailyBriefingHtml = latestEntry.briefing;
                        const syncDate = latestEntry.date;

                        document.getElementById('last-sync-date').textContent = syncDate;

                        const safeId = catName.replace(/[^a-zA-Z0-9]/g, '');

                        // Tab Button
                        const button = document.createElement('button');
                        button.textContent = catName;
                        button.onclick = (event) => openTab(event, safeId);
                        tabButtonsContainer.appendChild(button);

                        // Extract Macro-Trend
                        const liveTabContent = indexDoc.getElementById(safeId);
                        let weeklyRecapHtml = '<p>No macro-trend analysis available.</p>';
                        if (liveTabContent) {
                            const macroCard = liveTabContent.querySelector('.card:nth-child(2) .ai-content');
                            if (macroCard) weeklyRecapHtml = macroCard.innerHTML;
                        }

                        // Tab Content
                        const contentDiv = document.createElement('div');
                        contentDiv.id = safeId;
                        contentDiv.className = 'tabcontent';
                        contentDiv.innerHTML = `
                            <section class="content-section">
                                <h2 class="section-heading daily">Daily Analysis</h2>
                                <div class="ai-content">${dailyBriefingHtml}</div>
                            </section>
                            <hr class="section-divider">
                            <section class="content-section">
                                <h2 class="section-heading macro">Macro Trends</h2>
                                <div class="ai-content">${weeklyRecapHtml}</div>
                            </section>
                        `;
                        tabContentsContainer.appendChild(contentDiv);
                    }
                }

                const firstTabButton = tabButtonsContainer.querySelector('button');
                if (firstTabButton) firstTabButton.click();

            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #666;">
                        <h2 style="font-size: 1.25rem; margin-bottom: 12px;">Unable to load content</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        document.addEventListener("DOMContentLoaded", buildMockup);
    </script>
</body>

</html>
