<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Briefing | Premium Intelligence</title>

    <!-- Fonts from copy 2 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet">


    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto');
        @import url('https://fonts.googleapis.com/css2?family=Poppins&display=swap');

        :root {
            --ink: #0a0a0a;
            --paper: #f5f0e8;
            --accent: #c8102e;
            --muted: #6b6459;
            --rule: #c9bfaf;
            --max-width: 800px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background: var(--paper);
            color: var(--ink);
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }

        /* Progress Bar */
        .progress-container {
            position: fixed;
            top: 0;
            z-index: 100;
            width: 100%;
            height: 3px;
            background: transparent;
        }

        .progress-bar {
            height: 3px;
            background: var(--accent);
            width: 0%;
        }

        /* Masthead */
        header {
            border-bottom: 3px double var(--ink);
            padding: 18px 40px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }

        h1 {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(5rem, 7vw, 7rem);
            letter-spacing: 0.04em;
            text-align: center;
            flex: 1;
        }

        .subtitle {
            font-size: 1rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            text-align: right;
        }

        .date {
            font-size: 0.9rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* Nav → styled like category row */
        /* Category carousel (copy 2 style) */
        .category-stage {
            position: relative;
            overflow: hidden;
            padding: 32px 0 18px;
            border-bottom: 2px solid var(--ink);
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 16%, black 84%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 16%, black 84%, transparent 100%);
            cursor: grab;
        }

        .category-stage:active {
            cursor: grabbing;
        }

        .category-track {
            display: flex;
            align-items: center;
            will-change: transform;
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        .category-track.no-transition {
            transition: none;
        }

        .cat-item {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(3rem, 8vw, 6rem);
            letter-spacing: -0.1em;
            line-height: 1;
            white-space: nowrap;
            padding: 0 36px;
            color: var(--muted);
            opacity: 0.15;
            transform: scale(0.6);
            filter: blur(1px);
            transition: opacity 0.4s, transform 0.4s, color 0.4s, filter 0.4s;
            cursor: pointer;
            flex-shrink: 0;
        }

        .cat-item.active {
            color: var(--ink);
            opacity: 1;
            transform: scale(1.05);
            filter: blur(0);
        }

        .cat-item.adjacent {
            opacity: 0.35;
            transform: scale(0.75);
            filter: blur(0.5px);
        }

        .category-indicator {
            display: flex;
            justify-content: center;
            padding: 10px 0 0;
        }

        .category-indicator span {
            width: 32px;
            height: 3px;
            background: var(--accent);
            border-radius: 2px;
        }

        nav button {
            font-family: 'Poppins', sans-serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            letter-spacing: 0.04em;
            background: none;
            border: none;
            color: var(--muted);
            opacity: 0.25;
            transform: scale(0.7);
            cursor: pointer;
            transition: all 0.35s ease;
            flex-shrink: 0;
            scroll-snap-align: center;
        }

        nav button.active {
            color: var(--ink);
            opacity: 1;
            transform: scale(1);
        }

        /* Main */
        main {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 40px 80px;
        }

        .tabcontent {
            display: none;
        }

        /* Section label */
        .section-heading {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.18em;
            color: var(--muted);
            padding: 32px 0 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-heading::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--rule);
        }

        .section-divider {
            margin: 32px 0;
            border: none;
            border-top: 1px solid var(--rule);
        }

        /* Article style */
        .ai-content {
            -webkit-user-select: text;
            -moz-user-select: text;
            -ms-user-select: text;
            user-select: text;
            margin-top: 24px;
        }

        .ai-content p {
            font-size: 0.98rem;
            line-height: 1.8;
            color: #2a2520;
            margin-bottom: 16px;
            max-width: 620px;
        }

        .ai-content h3 {
            font-family: 'Poppins', sans-serif;
            font-size: 1.8rem;
            margin: 28px 0 12px;
        }

        .ai-content ul {
            margin: 20px 0;
            padding-left: 20px;
        }

        .ai-content li {
            margin-bottom: 8px;
        }

        /* Remove drop cap */
        .ai-content p:first-of-type::first-letter {
            all: unset;
        }

        /* Responsive */
        @media (max-width: 600px) {
            header {
                padding: 14px 20px;
                flex-direction: column;
                align-items: center;
            }

            nav {
                padding: 20px;
            }

            main {
                padding: 0 20px 60px;
            }

            nav button {
                font-size: 2rem;
            }
        }
    </style>
</head>

<body>
    <div class="progress-container">
        <div class="progress-bar" id="myBar"></div>
    </div>

    <header>
        <div class="date" id="last-sync-date">Loading...</div>
        <h1>Daily Briefing</h1><br>
        <p class="subtitle">What's going on today?</p>

    </header>
    <div class="category-stage" id="category-stage">
        <div class="category-track" id="category-track"></div>
    </div>
    <div class="category-indicator"><span></span></div>

    <main id="tab-contents"></main>

    <script>

        window.onscroll = function () {
            let winScroll = document.body.scrollTop || document.documentElement.scrollTop;
            let height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            let scrolled = (winScroll / height) * 100;
            document.getElementById("myBar").style.width = scrolled + "%";
        };

        function openTab(evt, tabName) {
            document.querySelectorAll('.tabcontent').forEach(el => el.style.display = 'none');
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }

        async function buildMockup() {
            try {
                const [historyResponse, indexHtmlResponse] = await Promise.all([
                    fetch('history.json'),
                    fetch('index.html')
                ]);

                if (!historyResponse.ok || !indexHtmlResponse.ok) {
                    throw new Error('Could not load data files.');
                }

                const historyData = await historyResponse.json();
                const indexHtmlText = await indexHtmlResponse.text();
                const indexDoc = new DOMParser().parseFromString(indexHtmlText, 'text/html');

                const categoryTrack = document.getElementById('category-track');
                const stage = document.getElementById('category-stage');
                const tabContentsContainer = document.getElementById('tab-contents');
                let currentIndex = 0;

                function getOffset(idx) {
                    const items = categoryTrack.querySelectorAll('.cat-item');
                    const stageW = stage.offsetWidth;
                    const item = items[idx];
                    if (!item) return 0;
                    return stageW / 2 - (item.offsetLeft + item.offsetWidth / 2);
                }

                function updateCats(idx) {
                    categoryTrack.querySelectorAll('.cat-item').forEach((el, i) => {
                        el.classList.remove('active', 'adjacent');
                        const d = Math.abs(i - idx);
                        if (d === 0) el.classList.add('active');
                        else if (d === 1) el.classList.add('adjacent');
                    });
                }

                function goTo(idx, instant) {
                    currentIndex = Math.max(0, Math.min(idx, categoryTrack.children.length - 1));
                    updateCats(currentIndex);

                    if (instant) categoryTrack.classList.add('no-transition');
                    categoryTrack.style.transform = `translateX(${getOffset(currentIndex)}px)`;
                    if (instant) requestAnimationFrame(() => categoryTrack.classList.remove('no-transition'));

                    document.querySelectorAll('.tabcontent').forEach(el => el.style.display = 'none');
                    const activeId = categoryTrack.children[currentIndex].dataset.target;
                    document.getElementById(activeId).style.display = 'block';
                }

                for (const catName in historyData) {
                    if (historyData.hasOwnProperty(catName) && historyData[catName].length > 0) {
                        const latestEntry = historyData[catName][historyData[catName].length - 1];
                        const dailyBriefingHtml = latestEntry.briefing;
                        const syncDate = latestEntry.date;

                        document.getElementById('last-sync-date').textContent = syncDate;

                        const safeId = catName.replace(/[^a-zA-Z0-9]/g, '');

                        const item = document.createElement('div');
                        item.className = 'cat-item';
                        item.textContent = catName;
                        item.dataset.target = safeId;
                        item.addEventListener('click', () => goTo(Array.from(categoryTrack.children).indexOf(item)));
                        categoryTrack.appendChild(item);

                        const liveTabContent = indexDoc.getElementById(safeId);
                        let weeklyRecapHtml = '<p>No macro-trend analysis available.</p>';
                        if (liveTabContent) {
                            const macroCard = liveTabContent.querySelector('.card:nth-child(2) .ai-content');
                            if (macroCard) weeklyRecapHtml = macroCard.innerHTML;
                        }

                        const contentDiv = document.createElement('div');
                        contentDiv.id = safeId;
                        contentDiv.className = 'tabcontent';
                        contentDiv.innerHTML = `
                            <section class="content-section">
                                <h2 class="section-heading daily">Daily Analysis</h2>
                                <div class="ai-content">${dailyBriefingHtml}</div>
                            </section>
                            <hr class="section-divider">
                            <section class="content-section">
                                <h2 class="section-heading macro">Macro Trends</h2>
                                <div class="ai-content">${weeklyRecapHtml}</div>
                            </section>
                        `;
                        tabContentsContainer.appendChild(contentDiv);
                    }
                }

                goTo(0, true);
                window.addEventListener('resize', () => goTo(currentIndex, true));

                // Drag / swipe
                let startX = 0, delta = 0, down = false;

                stage.addEventListener('pointerdown', e => {
                    down = true;
                    startX = e.clientX;
                    delta = 0;
                    categoryTrack.classList.add('no-transition');
                    stage.setPointerCapture(e.pointerId);
                });

                stage.addEventListener('pointermove', e => {
                    if (!down) return;
                    delta = e.clientX - startX;
                    categoryTrack.style.transform = `translateX(${getOffset(currentIndex) + delta}px)`;
                });

                stage.addEventListener('pointerup', () => {
                    if (!down) return;
                    down = false;
                    categoryTrack.classList.remove('no-transition');
                    if (delta < -60 && currentIndex < categoryTrack.children.length - 1) goTo(currentIndex + 1);
                    else if (delta > 60 && currentIndex > 0) goTo(currentIndex - 1);
                    else goTo(currentIndex);
                    delta = 0;
                });

            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #666;">
                        <h2 style="font-size: 1.25rem; margin-bottom: 12px;">Unable to load content</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        document.addEventListener("DOMContentLoaded", buildMockup);
    </script>
</body>

</html>
