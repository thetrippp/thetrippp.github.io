<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Briefing</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        :root {
            --bg-color: #ffffff;
            --surface-color: #f8f9fa;
            --text-color: #1a1a1a;
            --text-muted: #4a4a4a;
            --text-light: #6b6b6b;
            --accent-primary: #2563eb;
            --accent-secondary: #059669;
            --accent-tertiary: #dc2626;
            --accent-warm: #ea580c;
            --border-color: #e5e5e5;
            --border-light: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.85;
            max-width: 1100px;
            margin: 0 auto;
            padding: 60px 48px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            margin-bottom: 48px;
            padding-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            color: var(--text-color);
        }

        .subtitle {
            font-size: 1.125rem;
            color: var(--text-muted);
            font-weight: 400;
        }

        .date {
            font-size: 0.8rem;
            color: var(--text-light);
            margin-top: 20px;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* Navigation Tabs */
        nav {
            display: flex;
            gap: 12px;
            margin-bottom: 56px;
            flex-wrap: wrap;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }

        nav button {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 14px 28px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        nav button:hover {
            color: var(--text-color);
            border-color: var(--accent-primary);
            transform: translateY(-2px);
        }

        nav button.active {
            color: var(--bg-color);
            background: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        /* Tab Content */
        .tabcontent {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section Headings */
        .section-heading {
            font-size: 0.875rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            margin-bottom: 32px;
            padding-bottom: 16px;
            border-bottom: 3px solid;
        }

        .section-heading.daily {
            color: var(--accent-primary);
            border-color: var(--accent-primary);
        }

        .section-heading.macro {
            color: var(--accent-secondary);
            border-color: var(--accent-secondary);
        }

        /* Content Container */
        .content-section {
            margin-bottom: 64px;
        }

        /* Seamless Content */
        .ai-content {
            font-size: 1.125rem;
            line-height: 1.9;
            color: var(--text-color);
        }

        .ai-content p {
            margin-bottom: 0;
            text-indent: 2em;
        }

        .ai-content p:first-of-type {
            text-indent: 0;
        }

        .ai-content p:first-of-type::first-letter {
            font-size: 3.5rem;
            font-weight: 700;
            float: left;
            line-height: 1;
            padding-right: 12px;
            padding-top: 8px;
            color: var(--accent-primary);
        }

        /* Headings within content */
        .ai-content h3 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin: 48px 0 24px 0;
            padding-left: 20px;
            border-left: 4px solid var(--accent-warm);
            line-height: 1.3;
        }

        .ai-content h4 {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--accent-tertiary);
            margin: 36px 0 16px 0;
        }

        /* Lists */
        .ai-content ul,
        .ai-content ol {
            margin: 24px 0;
            padding-left: 0;
            list-style: none;
        }

        .ai-content li {
            position: relative;
            padding-left: 28px;
            margin-bottom: 16px;
            font-size: 1.0625rem;
            line-height: 1.8;
        }

        .ai-content ul li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 12px;
            width: 8px;
            height: 8px;
            background: var(--accent-primary);
            border-radius: 50%;
        }

        .ai-content ol {
            counter-reset: item;
        }

        .ai-content ol li {
            counter-increment: item;
        }

        .ai-content ol li::before {
            content: counter(item);
            position: absolute;
            left: 0;
            top: 2px;
            width: 24px;
            height: 24px;
            background: var(--accent-secondary);
            color: var(--bg-color);
            border-radius: 50%;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Strong text */
        .ai-content strong {
            color: var(--text-color);
            font-weight: 600;
        }

        /* Links */
        .ai-content a {
            color: var(--accent-primary);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border-color 0.2s;
        }

        .ai-content a:hover {
            border-bottom-color: var(--accent-primary);
        }

        /* Horizontal rule between major sections */
        .section-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-color), transparent);
            margin: 64px 0;
            border: none;
        }

        /* Responsive */
        @media (max-width: 640px) {
            body {
                padding: 48px 24px;
            }

            h1 {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            nav button {
                padding: 12px 20px;
                font-size: 0.875rem;
            }

            .ai-content {
                font-size: 1rem;
            }

            .ai-content h3 {
                font-size: 1.25rem;
            }

            .ai-content p:first-of-type::first-letter {
                font-size: 2.5rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <h1>Daily Briefing</h1>
        <p class="subtitle">Curated news analysis</p>
        <p class="date" id="last-sync-date">Loading...</p>
    </header>

    <nav id="tab-buttons"></nav>
    <main id="tab-contents"></main>

    <script>
        function openTab(evt, tabName) {
            document.querySelectorAll('.tabcontent').forEach(el => el.style.display = 'none');
            document.querySelectorAll('nav button').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).style.display = 'block';
            evt.currentTarget.classList.add('active');
        }

        async function buildMockup() {
            try {
                const [historyResponse, indexHtmlResponse] = await Promise.all([
                    fetch('history.json'),
                    fetch('index.html')
                ]);

                if (!historyResponse.ok || !indexHtmlResponse.ok) {
                    throw new Error('Could not load data files.');
                }

                const historyData = await historyResponse.json();
                const indexHtmlText = await indexHtmlResponse.text();
                const indexDoc = new DOMParser().parseFromString(indexHtmlText, 'text/html');

                const tabButtonsContainer = document.getElementById('tab-buttons');
                const tabContentsContainer = document.getElementById('tab-contents');

                for (const catName in historyData) {
                    if (historyData.hasOwnProperty(catName) && historyData[catName].length > 0) {
                        const latestEntry = historyData[catName][historyData[catName].length - 1];
                        const dailyBriefingHtml = latestEntry.briefing;
                        const syncDate = latestEntry.date;

                        document.getElementById('last-sync-date').textContent = syncDate;

                        const safeId = catName.replace(/[^a-zA-Z0-9]/g, '');

                        // Tab Button
                        const button = document.createElement('button');
                        button.textContent = catName;
                        button.onclick = (event) => openTab(event, safeId);
                        tabButtonsContainer.appendChild(button);

                        // Extract Macro-Trend
                        const liveTabContent = indexDoc.getElementById(safeId);
                        let weeklyRecapHtml = '<p>No macro-trend analysis available.</p>';
                        if (liveTabContent) {
                            const macroCard = liveTabContent.querySelector('.card:nth-child(2) .ai-content');
                            if (macroCard) weeklyRecapHtml = macroCard.innerHTML;
                        }

                        // Tab Content
                        const contentDiv = document.createElement('div');
                        contentDiv.id = safeId;
                        contentDiv.className = 'tabcontent';
                        contentDiv.innerHTML = `
                            <section class="content-section">
                                <h2 class="section-heading daily">Daily Analysis</h2>
                                <div class="ai-content">${dailyBriefingHtml}</div>
                            </section>
                            <hr class="section-divider">
                            <section class="content-section">
                                <h2 class="section-heading macro">Macro Trends</h2>
                                <div class="ai-content">${weeklyRecapHtml}</div>
                            </section>
                        `;
                        tabContentsContainer.appendChild(contentDiv);
                    }
                }

                const firstTabButton = tabButtonsContainer.querySelector('button');
                if (firstTabButton) firstTabButton.click();

            } catch (error) {
                console.error("Error:", error);
                document.body.innerHTML = `
                    <div style="padding: 40px; text-align: center; color: #666;">
                        <h2 style="font-size: 1.25rem; margin-bottom: 12px;">Unable to load content</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        document.addEventListener("DOMContentLoaded", buildMockup);
    </script>
</body>

</html>
