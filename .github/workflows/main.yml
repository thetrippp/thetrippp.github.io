name: Update AI News Dashboard

# This tells GitHub WHEN to run the script
on:
  schedule:
    - cron: '0 */6 * * *' # Runs at minute 0 past every 6th hour.
  workflow_dispatch: # Allows you to trigger it manually via a button

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml google-genai

      - name: Run the AI Scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd news_agent
          python apiscraper.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Specifically add the files inside the news_agent folder
          git add news_agent/index.html news_agent/history.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update AI Dashboard"
          git push